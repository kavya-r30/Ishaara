<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ishaara Chat</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f9fa;
      --surface2: #f1f3f4;
      --border: #e8eaed;
      --text: #202124;
      --muted: #5f6368;
      --accent: #1a73e8;
      --accent-dim: rgba(26,115,232,.10);
      --user-bg: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
      --bot-bg: #f8f9fa;
      --search-bg: #f1f3f4;
      --r: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .chat-app {
      display: flex; flex-direction: column;
      height: 100vh; width: 100%;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .chat-logo svg { display: block; }
    .chat-title {
      font-size: 16px; font-weight: 700;
      color: var(--text);
    }
    .chat-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Messages ─────────────────────────────────────────────────── */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
      background: var(--bg);
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg-row {
      display: flex; gap: 10px;
      max-width: 760px; width: 100%;
      align-self: flex-start;
    }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px; font-weight: 700;
    }
    .msg-avatar.bot { background: #e8f5e9; color: #2e7d32; }
    .msg-avatar.user { background: var(--accent-dim); color: var(--accent); }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--r);
      line-height: 1.6;
      font-size: 13.5px;
      max-width: 600px;
      word-wrap: break-word;
    }
    .msg-bubble.bot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .msg-bubble.user {
      background: var(--user-bg);
      border: 1px solid rgba(26,115,232,.2);
      border-top-right-radius: 4px;
      color: #ffffff;
    }
    .msg-bubble.system {
      background: var(--search-bg);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      align-self: center;
      text-align: center;
      border-radius: 12px;
      padding: 8px 16px;
    }

    .msg-bubble p { margin: 0 0 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble strong { color: var(--accent); }
    .msg-bubble code {
      background: rgba(0,0,0,.06); padding: 2px 5px;
      border-radius: 4px; font-size: 12px; font-family: 'Cascadia Mono', monospace;
    }
    .msg-bubble pre {
      background: var(--surface2); padding: 10px 12px;
      border-radius: 8px; overflow-x: auto; margin: 8px 0;
      font-size: 12px; line-height: 1.5;
      border: 1px solid var(--border);
    }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }

    /* ── Search Results ───────────────────────────────────────────── */
    .search-results {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 8px;
    }
    .search-card {
      display: block; padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none; color: var(--text);
      transition: background .15s, border-color .15s;
      cursor: pointer;
    }
    .search-card:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .search-card-title {
      font-size: 13px; font-weight: 600;
      color: var(--accent); margin-bottom: 3px;
    }
    .search-card-snippet { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .search-card-url { font-size: 10px; color: #9aa0a6; margin-top: 4px; }
    .search-answer {
      background: var(--accent-dim);
      border: 1px solid rgba(26,115,232,.15);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px; color: var(--text);
      margin-bottom: 4px; line-height: 1.5;
    }

    /* ── Thinking indicator ──────────────────────────────────────── */
    .thinking-row { display: flex; gap: 10px; align-items: center; }
    .thinking-dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      margin: 0 2px; opacity: .4;
      animation: blink 1.2s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* ── Input Area ───────────────────────────────────────────────── */
    .chat-input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
      max-width: 760px; margin: 0 auto;
    }
    .input-box {
      flex: 1;
      display: flex; align-items: flex-end;
      background: #ffffff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 4px 6px;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .chat-textarea {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text);
      font-family: inherit; font-size: 14px;
      padding: 10px 12px;
      resize: none; line-height: 1.5;
      max-height: 120px;
      min-height: 22px;
    }
    .chat-textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #ffffff;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #1765cc; transform: scale(1.05); }
    .send-btn:active { transform: scale(.95); }

    /* ── Welcome Card ────────────────────────────────────────────── */
    .welcome-card {
      max-width: 520px; margin: auto;
      text-align: center; padding: 40px 32px;
    }
    .welcome-logo { margin-bottom: 16px; }
    .welcome-title {
      font-size: 22px; font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .welcome-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .welcome-chips {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    }
    .welcome-chip {
      background: #ffffff; border: 1.5px solid var(--border);
      border-radius: 20px; padding: 7px 14px;
      font-size: 12px; color: var(--muted);
      cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .welcome-chip:hover {
      background: var(--accent-dim); border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="chat-app">

    <!-- Header -->
    <header class="chat-header">
      <div class="chat-logo">
        <svg viewBox="0 0 64 64" width="32" height="32">
          <rect width="64" height="64" rx="14" fill="#1a3a2e"/>
          <g fill="#2fbe8f">
            <rect x="20" y="34" width="24" height="16" rx="5"/>
            <rect x="22" y="18" width="7"  height="18" rx="3.5"/>
            <rect x="31" y="14" width="7"  height="22" rx="3.5"/>
            <rect x="40" y="20" width="5"  height="16" rx="2.5"/>
          </g>
          <circle cx="22" cy="14" r="3.5" fill="#5fffc8"/>
        </svg>
      </div>
      <div>
        <div class="chat-title">Ishaara Chat</div>
        <div class="chat-subtitle">AI Assistant · Powered by Mistral & Tavily</div>
      </div>
    </header>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">

      <!-- Welcome -->
      <div class="welcome-card" id="welcome-card">
        <div class="welcome-logo">
          <svg viewBox="0 0 64 64" width="56" height="56">
            <rect width="64" height="64" rx="14" fill="#1a3a2e"/>
            <g fill="#2fbe8f">
              <rect x="20" y="34" width="24" height="16" rx="5"/>
              <rect x="22" y="18" width="7"  height="18" rx="3.5"/>
              <rect x="31" y="14" width="7"  height="22" rx="3.5"/>
              <rect x="40" y="20" width="5"  height="16" rx="2.5"/>
            </g>
            <circle cx="22" cy="14" r="3.5" fill="#5fffc8"/>
          </svg>
        </div>
        <div class="welcome-title">Welcome to Ishaara Chat</div>
        <p class="welcome-desc">
          Ask me anything! I can search the web, answer questions, summarise articles,
          help with tasks, and much more. Powered by Mistral AI with Tavily web search.
        </p>
        <div class="welcome-chips" id="welcome-chips">
          <button class="welcome-chip" data-prompt="What's the latest tech news?">📰 Latest tech news</button>
          <button class="welcome-chip" data-prompt="Explain quantum computing simply">🧠 Explain quantum computing</button>
          <button class="welcome-chip" data-prompt="Search for healthy breakfast recipes">🍳 Healthy breakfast recipes</button>
          <button class="welcome-chip" data-prompt="What is the weather forecast for today?">🌤️ Weather forecast</button>
          <button class="welcome-chip" data-prompt="Tell me a fun fact">⚡ Fun fact</button>
        </div>
      </div>

    </div>

    <!-- Thinking indicator (hidden by default) -->
    <div class="thinking-row" id="thinking-row" style="display:none; padding: 0 24px 8px;">
      <div class="msg-avatar bot">
        <svg viewBox="0 0 64 64" width="14" height="14"><g fill="#2e7d32"><rect x="20" y="34" width="24" height="16" rx="5"/><rect x="22" y="18" width="7" height="18" rx="3.5"/></g></svg>
      </div>
      <div class="thinking-dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="input-row">
        <div class="input-box">
          <textarea class="chat-textarea" id="chat-input" rows="1"
                    placeholder="Ask anything… search the web, ask questions, get help"
                    autocomplete="off"></textarea>
        </div>
        <button class="send-btn" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <script>
    'use strict';

    const messagesEl = document.getElementById('chat-messages');
    const inputEl    = document.getElementById('chat-input');
    const sendBtn    = document.getElementById('send-btn');
    const thinkingEl = document.getElementById('thinking-row');
    const welcomeEl  = document.getElementById('welcome-card');

    let chatHistory = [];
    let _pendingCallbacks = {};
    let _callId = 0;

    // ── IPC Relay via postMessage ──────────────────────────────────
    // Since chat.html runs inside a webview without direct electronAPI access,
    // we relay API calls to the parent window (app.js) via postMessage.
    function callParentAPI(method, args) {
      return new Promise((resolve, reject) => {
        const id = ++_callId;
        _pendingCallbacks[id] = { resolve, reject };
        // Use console.log with a special prefix — the parent listens via console-message event
        console.log('__ISHAARA_IPC__' + JSON.stringify({ id, method, args }));
        // Timeout after 30s
        setTimeout(() => {
          if (_pendingCallbacks[id]) {
            delete _pendingCallbacks[id];
            reject(new Error('API call timed out'));
          }
        }, 30000);
      });
    }

    // Listen for responses from parent
    window.addEventListener('message', (e) => {
      try {
        const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        if (data && data.__ISHAARA_RESPONSE__ && _pendingCallbacks[data.id]) {
          const cb = _pendingCallbacks[data.id];
          delete _pendingCallbacks[data.id];
          if (data.error) cb.reject(new Error(data.error));
          else cb.resolve(data.result);
        }
      } catch (_) {}
    });

    // ── Auto-resize textarea ─────────────────────────────────────
    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    }
    inputEl.addEventListener('input', autoResize);

    // ── Send message ─────────────────────────────────────────────
    async function sendMessage(text) {
      text = (text || '').trim();
      if (!text) return;

      // Hide welcome card
      if (welcomeEl) welcomeEl.style.display = 'none';

      // Add user message
      addMessage('user', text);
      inputEl.value = '';
      autoResize();

      chatHistory.push({ role: 'user', content: text });

      // Check if it's a search request
      const isSearch = /\b(search|find|look up|latest|news|what is|who is|how to|when did)\b/i.test(text);

      showThinking(true);

      try {
        // Try web search first if it looks like a search query
        if (isSearch) {
          try {
            const sr = await callParentAPI('searchWeb', { query: text, maxResults: 5 });
            if (sr && sr.success && sr.results && sr.results.length > 0) {
              addSearchResults(sr);

              // Feed search results to AI for a synthesized answer
              const searchContext = sr.results.map(r =>
                `[${r.title}]: ${(r.snippet || '').slice(0, 200)} (${r.url})`
              ).join('\n');

              const aiPrompt = `Based on these web search results for "${text}":\n${searchContext}\n\n${sr.answer ? `Quick answer: ${sr.answer}\n\n` : ''}Please provide a comprehensive, helpful answer to the user's question. Be concise but thorough. Use the search results as your source.`;

              chatHistory.push({ role: 'user', content: aiPrompt });

              const res = await callParentAPI('queryMistral', {
                command: aiPrompt,
                pageContext: { title: 'Ishaara Chat', url: '/chat', bodyText: '' },
                history: chatHistory.slice(-16),
              });

              showThinking(false);

              if (res && res.success && res.data) {
                const reply = res.data.speech || res.data.explanation || JSON.stringify(res.data);
                addMessage('bot', reply);
                chatHistory.push({ role: 'assistant', content: reply });
              }
              return;
            }
          } catch (searchErr) {
            console.warn('[Chat search error]', searchErr);
          }
        }

        // Direct AI query
        const res = await callParentAPI('queryMistral', {
          command: text,
          pageContext: { title: 'Ishaara Chat', url: '/chat', bodyText: '', interactive: [], headings: [] },
          history: chatHistory.slice(-16),
        });

        showThinking(false);

        if (res && res.success && res.data) {
          const reply = res.data.speech || res.data.explanation || '';
          if (reply) {
            addMessage('bot', reply);
            chatHistory.push({ role: 'assistant', content: reply });
          } else {
            addMessage('system', 'No response received from AI.');
          }
        } else {
          addMessage('system', `⚠ ${res?.error || 'Failed to get AI response. Check your API key in Settings.'}`);
        }
      } catch (err) {
        showThinking(false);
        addMessage('system', `⚠ Error: ${err?.message || String(err)}`);
      }
    }

    // ── Add message to chat ──────────────────────────────────────
    function addMessage(role, text) {
      const row = document.createElement('div');

      if (role === 'system') {
        row.className = 'msg-row';
        row.style.maxWidth = '400px';
        row.style.alignSelf = 'center';
        row.innerHTML = `<div class="msg-bubble system">${escHtml(text)}</div>`;
      } else {
        row.className = `msg-row ${role === 'user' ? 'user' : ''}`;
        const avatarClass = role === 'user' ? 'user' : 'bot';
        const avatarContent = role === 'user' ? '👤' : '<svg viewBox="0 0 64 64" width="14" height="14"><g fill="#2e7d32"><rect x="20" y="34" width="24" height="16" rx="5"/><rect x="22" y="18" width="7" height="18" rx="3.5"/></g></svg>';
        row.innerHTML = `
          <div class="msg-avatar ${avatarClass}">${avatarContent}</div>
          <div class="msg-bubble ${avatarClass}">${role === 'user' ? escHtml(text) : renderMd(text)}</div>
        `;
      }

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Add search results ───────────────────────────────────────
    function addSearchResults(sr) {
      const row = document.createElement('div');
      row.className = 'msg-row';

      let html = '<div class="msg-avatar bot"><svg viewBox="0 0 64 64" width="14" height="14"><g fill="#2e7d32"><rect x="20" y="34" width="24" height="16" rx="5"/><rect x="22" y="18" width="7" height="18" rx="3.5"/></g></svg></div>';
      html += '<div style="flex:1;max-width:600px">';

      if (sr.answer) {
        html += `<div class="search-answer">${escHtml(sr.answer)}</div>`;
      }

      html += '<div class="search-results">';
      for (const r of (sr.results || []).slice(0, 5)) {
        html += `<a class="search-card" href="${escAttr(r.url)}" target="_blank" rel="noopener">
          <div class="search-card-title">${escHtml(r.title || '')}</div>
          <div class="search-card-snippet">${escHtml((r.snippet || '').slice(0, 150))}</div>
          <div class="search-card-url">${escHtml((r.url || '').replace(/^https?:\/\//, '').slice(0, 60))}</div>
        </a>`;
      }
      html += '</div></div>';

      row.innerHTML = html;
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Wire card clicks to navigate in parent webview
      row.querySelectorAll('.search-card').forEach(card => {
        card.addEventListener('click', e => {
          e.preventDefault();
          window.location.href = card.getAttribute('href');
        });
      });
    }

    // ── Thinking indicator ───────────────────────────────────────
    function showThinking(on) {
      thinkingEl.style.display = on ? 'flex' : 'none';
      if (on) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Utils ────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function renderMd(raw) {
      if (!raw) return '';
      let s = String(raw);
      const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const blocks = [];
      s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        blocks.push(`<pre><code>${esc(code.trim())}</code></pre>`);
        return `\x00B${blocks.length - 1}\x00`;
      });
      s = esc(s);
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
      s = s.replace(/((?:^[*\-+] .+\n?)+)/gm, b => {
        const items = b.trim().split('\n').map(l => `<li>${l.replace(/^[*\-+] /,'')}</li>`).join('');
        return `<ul>${items}</ul>`;
      });
      s = s.replace(/((?:^\d+\. .+\n?)+)/gm, b => {
        const items = b.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
        return `<ol>${items}</ol>`;
      });
      s = s.split(/\n\n+/).map(p => {
        p = p.trim();
        if (!p) return '';
        if (/^<(h[1-6]|ul|ol|pre|blockquote)/.test(p)) return p;
        return `<p>${p.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');
      s = s.replace(/\x00B(\d+)\x00/g, (_, i) => blocks[parseInt(i)]);
      return s;
    }

    // ── Events ───────────────────────────────────────────────────
    sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(inputEl.value);
      }
    });

    // Welcome chip clicks
    document.getElementById('welcome-chips').addEventListener('click', e => {
      const chip = e.target.closest('.welcome-chip');
      if (chip) {
        const prompt = chip.dataset.prompt;
        inputEl.value = prompt;
        sendMessage(prompt);
      }
    });
  </script>
</body>
</html>
